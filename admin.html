<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>六盘山 - 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0e1a;color:#e0e8f0;min-height:100vh}
.header{background:linear-gradient(135deg,#1a0030,#0a2040);padding:20px;text-align:center;border-bottom:2px solid #00ccaa}
.header h1{font-size:20px;color:#00ccaa;margin-bottom:4px}
.header p{font-size:12px;color:#5a7a99}
.container{max-width:500px;margin:0 auto;padding:16px}
.card{background:#0c1e30;border:1px solid #1a3a5a;border-radius:16px;padding:20px;margin-bottom:16px}
.card h3{font-size:15px;color:#00ccaa;margin-bottom:14px;border-bottom:1px solid #1a3a5a;padding-bottom:8px}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:12px;color:#5a7a99;margin-bottom:4px}
.form-row input,.form-row select{width:100%;height:42px;background:#0a1628;border:1px solid #1a3a5a;border-radius:10px;padding:0 12px;color:#e0e8f0;font-size:14px;outline:none}
.form-row input:focus{border-color:#00ccaa}
.btn{width:100%;height:44px;border:none;border-radius:22px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
.btn-primary{background:linear-gradient(135deg,#00ccaa,#00aa88);color:#000}
.btn-danger{background:linear-gradient(135deg,#ff3355,#ff6600);color:#fff}
.tabs{display:flex;gap:4px;margin-bottom:16px}
.tab{flex:1;text-align:center;padding:10px;background:#0a1628;border-radius:10px;font-size:13px;color:#5a7a99;cursor:pointer;border:1px solid transparent}
.tab.active{background:#0c1e30;border-color:#00ccaa;color:#00ccaa}
.panel{display:none}
.panel.active{display:block}
.login-box{max-width:360px;margin:80px auto;padding:24px}
.login-box h2{text-align:center;color:#00ccaa;margin-bottom:20px}
.preview-item{padding:6px 0;border-bottom:1px solid #1a3a5a;font-size:13px}
.status{display:none;padding:12px;border-radius:10px;margin-top:12px;font-size:13px}
</style>
</head>
<body>
<div id="loginPage">
  <div class="login-box">
    <div class="card">
      <h2>&#x1F512; 管理后台</h2>
      <div class="form-row">
        <label>管理密码</label>
        <input type="password" id="adminPwd" placeholder="请输入管理密码">
      </div>
      <div class="form-row">
        <label>GitHub Token（用于推送选股数据）</label>
        <input type="password" id="adminToken" placeholder="ghp_开头的GitHub个人访问令牌">
      </div>
      <button class="btn btn-primary" onclick="doLogin()">进入后台</button>
    </div>
  </div>
</div>

<div id="adminPage" style="display:none">
  <div class="header">
    <h1>&#x1F3AF; 六盘山 · 管理后台</h1>
    <p>管理员操作面板</p>
  </div>
  <div class="container">
    <div class="tabs">
      <div class="tab active" id="tabStock" onclick="switchTab('stock')">策略选股</div>
      <div class="tab" id="tabHot" onclick="switchTab('hot')">盘前热点</div>
      <div class="tab" id="tabCredit" onclick="switchTab('credit')">充值确认</div>
      <div class="tab" id="tabHistory" onclick="switchTab('history')">操作记录</div>
    </div>

    <div class="panel active" id="panelStock">
      <div class="card">
        <h3>&#x1F534; 8:36 六强现身</h3>
        <p style="font-size:12px;color:#5a7a99;margin-bottom:12px">输入股票名称或6位代码，支持逗号/空格/换行分隔</p>
        <div id="stockInputs"></div>
        <div style="margin-top:4px">
          <input type="text" id="stockPaste" placeholder="或在此粘贴多只股票（名称或代码，逗号分隔）" style="width:100%;height:36px;background:#0a1628;border:1px solid #1a3a5a;border-radius:8px;padding:0 10px;color:#e0e8f0;font-size:13px" onchange="onPasteStocks(this.value)">
        </div>
        <button class="btn btn-primary" id="btnFetch" onclick="fetchAndPreview()">抓取实时行情</button>
        <div id="stockPreview" style="display:none;margin-top:12px">
          <div id="previewContent"></div>
          <button class="btn btn-danger" id="btnPush" onclick="pushToApp()">推送到APP</button>
        </div>
        <div class="status" id="pushStatus"></div>
      </div>
    </div>

    <div class="panel" id="panelHot">
      <div class="card">
        <h3>&#x1F4F0; 盘前热点推送</h3>
        <div class="form-row"><label>热点标题</label><input type="text" id="hotTitle"></div>
        <div class="form-row"><label>热点描述</label><input type="text" id="hotDesc"></div>
        <div class="form-row"><label>相关股票（逗号分隔）</label><input type="text" id="hotStocks"></div>
        <button class="btn btn-primary" onclick="pushHotTopics()">推送热点</button>
      </div>
    </div>

    <div class="panel" id="panelCredit">
      <div class="card">
        <h3>&#x1F4B0; 充值确认</h3>
        <div class="form-row"><label>用户手机号</label><input type="text" id="creditPhone"></div>
        <div class="form-row"><label>充值积分</label><input type="number" id="creditPts"></div>
        <button class="btn btn-primary" onclick="confirmCredit()">确认充值</button>
        <div class="status" id="creditStatus"></div>
      </div>
    </div>

    <div class="panel" id="panelHistory">
      <div class="card">
        <h3>&#x1F4CB; 操作记录</h3>
        <div id="historyList"></div>
      </div>
    </div>
  </div>
</div>

<script>
var ADMIN_PWD = '888888';
var GITHUB_TOKEN = '';
var GITHUB_OWNER = 'fengzezhang31-hue';
var GITHUB_REPO = 'panqian-cainiu';
var PET_NAMES = ['冲动牛','萌萌熊','恐惧龙','空仓猫','大犟驴','悟道鹰'];
var fetchedStocks = null;

// 初始化6个输入框
(function(){
  var html = '';
  for (var i = 0; i < 6; i++) {
    html += '<div class="form-row"><label>'+PET_NAMES[i]+'（第'+(i+1)+'只）</label><input type="text" id="stk'+i+'" placeholder="股票名称或6位代码"></div>';
  }
  document.getElementById('stockInputs').innerHTML = html;
})();

function doLogin() {
  var pwd = document.getElementById('adminPwd').value.trim();
  var token = document.getElementById('adminToken').value.trim();
  if (pwd === ADMIN_PWD) {
    if (token) GITHUB_TOKEN = token;
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'block';
  } else {
    alert('密码错误');
  }
}

function switchTab(tab) {
  ['stock','hot','credit','history'].forEach(function(t){
    document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).className = t===tab?'tab active':'tab';
    document.getElementById('panel'+t.charAt(0).toUpperCase()+t.slice(1)).className = t===tab?'panel active':'panel';
  });
  if (tab === 'history') loadHistory();
}

function onPasteStocks(val) {
  if (!val) return;
  var names = val.split(/[,，\s\n]+/).filter(function(n){return n.trim()});
  for (var i = 0; i < Math.min(6, names.length); i++) {
    var el = document.getElementById('stk'+i);
    if (el) el.value = names[i].trim();
  }
}

function codeToSecid(code) {
  if (code.startsWith('6')) return '1.' + code;
  return '0.' + code;
}

// 名称→代码 用JSONP
function resolveNameToCode(name) {
  return new Promise(function(resolve) {
    name = name.trim();
    if (/^\d{6}$/.test(name)) { resolve(name); return; }
    var clean = name.replace(/[\.\s,，、]+/g, '');
    var cb = '_srcb_' + Date.now();
    var done = false;
    var t = setTimeout(function(){ if(!done){done=true;cleanup();resolve(null);} }, 5000);
    function cleanup(){ clearTimeout(t); try{delete window[cb];}catch(e){} var s=document.getElementById('_ss'); if(s&&s.parentNode)s.parentNode.removeChild(s); }
    window[cb] = function(json){
      if(done)return; done=true;
      try{
        if(json&&json.QuotationCodeTable&&json.QuotationCodeTable.Data){
          var r=json.QuotationCodeTable.Data.filter(function(d){return d.SecurityTypeName&&(d.SecurityTypeName.indexOf('A')>=0||d.SecurityTypeName.indexOf('深')>=0||d.SecurityTypeName.indexOf('沪')>=0)});
          if(r.length>0){for(var i=0;i<r.length;i++){if(r[i].Name===clean||r[i].Code.indexOf(clean)>=0){cleanup();resolve(r[i].Code);return}}cleanup();resolve(r[0].Code);return}
        }
        cleanup();resolve(null);
      }catch(e){cleanup();resolve(null);}
    };
    var s=document.createElement('script');s.id='_ss';
    s.src='https://searchapi.eastmoney.com/api/suggest/get?input='+encodeURIComponent(clean)+'&type=14&token=D43BF722C8E33BDC906FB84D85E326E8&count=5&cb='+cb;
    s.onerror=function(){if(!done){done=true;cleanup();resolve(null);}};
    document.head.appendChild(s);
  });
}

async function fetchAndPreview() {
  var codes = [];
  var btn = document.getElementById('btnFetch');
  btn.disabled = true;
  btn.textContent = '识别中...';

  for (var i = 0; i < 6; i++) {
    var c = document.getElementById('stk'+i).value.trim();
    if (!c) { alert('第'+(i+1)+'只股票信息为空'); btn.disabled=false; btn.textContent='抓取实时行情'; return; }
    if (!/^\d{6}$/.test(c)) {
      var resolved = await resolveNameToCode(c);
      if (!resolved) { alert('无法识别: '+c+'\n请直接输入6位数字代码'); btn.disabled=false; btn.textContent='抓取实时行情'; return; }
      c = resolved;
    }
    codes.push(c);
  }

  btn.textContent = '抓取中...';
  var cb = '_admcb_' + Date.now();

  window[cb] = function(json) {
    try{delete window[cb];}catch(e){}
    var s=document.getElementById('_fs');if(s&&s.parentNode)s.parentNode.removeChild(s);
    btn.disabled=false;btn.textContent='抓取实时行情';
    if(!json||!json.data||!json.data.diff||json.data.diff.length<6){alert('行情数据不完整，请检查股票代码');return;}
    var map={};json.data.diff.forEach(function(d){map[d.f12]=d;});
    fetchedStocks=[];
    var html='<div style="color:#00ccaa;font-weight:700;margin-bottom:8px">抓取成功，请确认：</div>';
    for(var i=0;i<codes.length;i++){
      var d=map[codes[i]];
      if(!d){alert('股票'+codes[i]+'未找到');return;}
      fetchedStocks.push({name:d.f14,code:d.f12,bidPrice:d.f18,currentPrice:d.f2,openPrice:d.f17,yesterdayClose:d.f18,changePercent:d.f3,entityGain:d.f3});
      var cls=d.f3>=0?'color:#ff4466':'color:#44cc88';
      html+='<div class="preview-item"><span style="color:#ffd966">'+PET_NAMES[i]+'</span>@<b>'+d.f14+'</b>('+d.f12+') 昨收:'+d.f18+' 现价:<b>'+d.f2+'</b> <span style="'+cls+'">'+(d.f3>=0?'+':'')+d.f3+'%</span></div>';
    }
    document.getElementById('previewContent').innerHTML=html;
    document.getElementById('stockPreview').style.display='block';
    document.getElementById('pushStatus').style.display='none';
  };

  var s=document.createElement('script');s.id='_fs';
  s.src='https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&secids='+codes.map(codeToSecid).join(',')+'&fields=f2,f3,f12,f14,f17,f18&cb='+cb;
  s.onerror=function(){try{delete window[cb];}catch(e){}btn.disabled=false;btn.textContent='抓取实时行情';alert('网络请求失败，请重试');var x=document.getElementById('_fs');if(x&&x.parentNode)x.parentNode.removeChild(x);};
  document.head.appendChild(s);
}

function pushToApp() {
  if(!fetchedStocks||fetchedStocks.length!==6){alert('请先抓取行情');return;}
  if(!GITHUB_TOKEN){alert('请先填写GitHub Token');return;}
  var btn=document.getElementById('btnPush');btn.disabled=true;btn.textContent='推送中...';
  var st=document.getElementById('pushStatus');st.style.display='block';st.style.background='#1a2a40';st.style.color='#88aacc';st.innerHTML='正在推送到 GitHub...';

  var d=new Date();
  var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  var data={date:ds,stocks:fetchedStocks.map(function(s){return{name:s.name,code:s.code,bidPrice:s.bidPrice,currentPrice:s.currentPrice,openPrice:s.openPrice,yesterdayClose:s.yesterdayClose,changePercent:s.changePercent,entityGain:s.entityGain};}),news:[],twitterTrends:[]};
  var json=JSON.stringify(data,null,2);
  var b64=btoa(unescape(encodeURIComponent(json)));

  fetch('https://api.github.com/repos/'+GITHUB_OWNER+'/'+GITHUB_REPO+'/contents/market-data.json',{headers:{'Authorization':'token '+GITHUB_TOKEN}})
  .then(function(r){return r.json();})
  .then(function(info){
    return fetch('https://api.github.com/repos/'+GITHUB_OWNER+'/'+GITHUB_REPO+'/contents/market-data.json',{
      method:'PUT',
      headers:{'Authorization':'token '+GITHUB_TOKEN,'Content-Type':'application/json'},
      body:JSON.stringify({message:'管理后台推送 '+ds+': '+fetchedStocks.map(function(s){return s.name}).join(','),content:b64,sha:info.sha})
    });
  })
  .then(function(r){return r.json();})
  .then(function(result){
    btn.disabled=false;btn.textContent='推送到APP';
    if(result.content){
      st.style.background='#0a2a1a';st.style.color='#44cc88';st.innerHTML='推送成功！前端将在1-2分钟内更新。';
    }else{
      st.style.background='#2a0a1a';st.style.color='#ff4466';st.innerHTML='推送失败：'+JSON.stringify(result);
    }
  })
  .catch(function(e){
    btn.disabled=false;btn.textContent='推送到APP';
    st.style.background='#2a0a1a';st.style.color='#ff4466';st.innerHTML='推送失败：'+e.message;
  });
}

function pushHotTopics(){
  alert('热点推送功能开发中');
}

function confirmCredit(){
  var phone=document.getElementById('creditPhone').value.trim();
  var pts=parseInt(document.getElementById('creditPts').value)||0;
  if(!phone){alert('请输入手机号');return;}
  if(!pts||pts<=0){alert('请输入有效积分');return;}
  var records=JSON.parse(localStorage.getItem('panqian_recharge_records')||'[]');
  records.push({phone:phone,pts:pts,time:new Date().toISOString(),status:'confirmed'});
  localStorage.setItem('panqian_recharge_records',JSON.stringify(records));
  document.getElementById('creditStatus').style.display='block';
  document.getElementById('creditStatus').style.background='#0a2a1a';
  document.getElementById('creditStatus').style.color='#44cc88';
  document.getElementById('creditStatus').innerHTML='已确认充值 '+pts+' 积分给 '+phone;
}

function loadHistory(){
  var records=JSON.parse(localStorage.getItem('panqian_recharge_records')||'[]');
  var html='';
  records.reverse().forEach(function(r){
    html+='<div class="preview-item">'+r.phone+' +'+r.pts+'积分 <span style="color:#5a7a99;font-size:11px">'+new Date(r.time).toLocaleString()+'</span></div>';
  });
  document.getElementById('historyList').innerHTML=html||'暂无记录';
}

document.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
