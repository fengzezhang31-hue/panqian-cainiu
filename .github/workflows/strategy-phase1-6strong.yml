# 六盘山 - 策略引擎 Phase1
# 每工作日 08:26 北京时间 执行
# 输出: market-data.json (含6强V3.0评分排序)
name: Strategy Engine Phase1 (6强)

on:
  schedule:
    - cron: '26 0 * * 1-5'  # 08:26 CST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Run Strategy Engine Phase1
      run: node scripts/strategy-engine.js phase1
    
    - name: Commit market-data.json
      run: |
        git config user.name "六盘山 Bot"
        git config user.email "bot@liupanshan.app"
        git add market-data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "[6强] 策略V3.0评分完成 $(date '+%Y-%m-%d %H:%M')" && git push)
        echo "✅ 6强已推送到仓库"
