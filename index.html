<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>六盘山</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#030609;display:flex;align-items:center;justify-content:center;height:100vh;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
.loading{text-align:center}
.loading .title{font-size:32px;font-weight:900;background:linear-gradient(90deg,#0044ff,#00bbff,#00ffff,#0088ff,#0044ff);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite;margin-bottom:12px}
.loading .sub{color:#66ccff;font-size:14px;margin-bottom:24px}
.loading .dots{display:flex;justify-content:center;gap:8px}
.loading .dots span{width:10px;height:10px;border-radius:50%;background:#00ccff;animation:bounce 1.2s infinite}
.loading .dots span:nth-child(2){animation-delay:0.2s}
.loading .dots span:nth-child(3){animation-delay:0.4s}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes bounce{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div class="loading">
<div class="title">六盘山</div>
<div class="sub">盘感好不好·六盘山上练一练</div>
<div class="dots"><span></span><span></span><span></span></div>
</div>
<script>
// 自动跳转到CDN版本
var cdnUrl = 'https://cdn.jsdelivr.net/gh/fengzezhang31-hue/panqian-cainiu@main/gumo-app.html';
setTimeout(function(){ window.location.href = cdnUrl; }, 1500);
</script>
</body>
</html>
